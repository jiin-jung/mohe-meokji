spring:
  datasource:
    # MySQL 접속 주소
    url: ${DB_URL:jdbc:mysql://localhost:3306/mohemeokji?useSSL=false&serverTimezone=Asia/Seoul&allowPublicKeyRetrieval=true}
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      # 서버 실행 시 테이블이 없으면 자동으로 생성
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

  gemini:
    api:
      key: ${GEMINI_API_KEY}
      url: "${GEMINI_API_URL:https://generativelanguage.googleapis.com/v1beta/models/gemini-flash-latest:generateContent}"


  youtube:
    api:
      key: ${YOUTUBE_API_KEY}
      url: ${YOUTUBE_API_URL:https://www.googleapis.com/youtube/v3/search}