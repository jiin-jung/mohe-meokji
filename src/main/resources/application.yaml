server:
  port: ${SERVER_PORT:8080}

spring:
  datasource:
    # MySQL 접속 주소
    url: ${DB_URL:jdbc:mysql://localhost:3306/mohemeokji?useSSL=false&serverTimezone=Asia/Seoul&allowPublicKeyRetrieval=true}
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      # [개발 전용] 테이블 자동 생성/변경. 프로덕션에서는 반드시 validate 또는 none으로 변경할 것.
      # 프로덕션 배포 시: spring.profiles.active=prod 또는 환경변수 DDL_AUTO=validate 설정
      ddl-auto: ${DDL_AUTO:update}
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

  gemini:
    api:
      key: ${GEMINI_API_KEY}
      url: "${GEMINI_API_URL:https://generativelanguage.googleapis.com/v1beta/models/gemini-flash-latest:generateContent}"


  youtube:
    api:
      key: ${YOUTUBE_API_KEY}
      url: ${YOUTUBE_API_URL:https://www.googleapis.com/youtube/v3/search}

app:
  auth:
    dev-user-id: ${DEV_USER_ID:2}
